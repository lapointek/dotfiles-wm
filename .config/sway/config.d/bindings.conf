#################
#   Variables   #
#################
set $mod Mod4
set $term foot
set $launcher rofi

# Power menu script
set $powermenu $HOME/.config/sway/scripts/power_menu.sh

# Volume helper script
set $volume_helper_cmd $HOME/.config/sway/scripts/volume_helper.sh

# Vim keybindings
set $left h
set $down j
set $up k
set $right l

#####################
#  Basic Operations #
#####################
bindsym $mod+q kill
bindsym $mod+Shift+c reload

#######################
#  Floating Modifier  #
#######################
# Grab floating window
floating_modifier $mod normal

##################
#  Focus Change  #
##################
# Move your focus around
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right
# Or use $mod+[up|down|left|right]
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Move the focused window with the same, but add Shift
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right
# Ditto, with arrow keys
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

#######################
#  Switch Workspaces  #
#######################
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

# Move focused container to workspace
bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10

# Switch workspaces back and forth
bindsym $mod+Tab workspace back_and_forth

# Switch windows
bindsym alt+Tab focus right
bindsym alt+Shift+Tab focus left

######################
#  Window Modifying  #
######################
# Split window horizontally
bindsym $mod+c splith

# Split window vertically
bindsym $mod+v splitv

# Switch the current container between different layout styles
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split

# Make the current focus fullscreen
bindsym $mod+f fullscreen

# Toggle the current focus between tiling and floating mode
bindsym $mod+Shift+space floating toggle

# Swap focus between the tiling area and the floating area
bindsym $mod+space focus mode_toggle

# Move focus to the parent container
bindsym $mod+a focus parent

#####################
#  Window Resizing  #
#####################
# Resize window with vim keys
mode "resize" {
    bindsym $left resize grow width 10px
    bindsym $down resize grow height 10px
    bindsym $up resize shrink height 10px
    bindsym $right resize shrink width 10px

    # Ditto, with arrow keys
    bindsym Left resize grow width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize shrink width 10px

    # Return to default mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"

#######################################
#  Application Shortcuts and Actions  #
#######################################
# Start a terminal
bindsym $mod+Return exec $term

# Start launcher
bindsym $mod+d exec $launcher -show drun

# Thunar
bindsym $mod+o exec thunar

# Brave browser
bindsym $mod+b exec brave-browser

# Neovim
bindsym $mod+n exec foot nvim

# Visual Studio Code
bindsym $mod+i exec code

# Open power menu
bindsym $mod+Escape exec $powermenu

# Exit sway (logs you out of your Wayland session)
bindsym $mod+Shift+e exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -B 'Yes, exit sway' 'swaymsg exit'

# Start Swaylock
bindsym $mod+Ctrl+l exec swaylock -C $HOME/.config/sway/swaylock/config

################
#  Scratchpad  #
################
# Move the currently focused window to the scratchpad
bindsym $mod+Shift+minus move scratchpad

# Show the next scratchpad window
bindsym $mod+minus scratchpad show, floating disable

################
#  Brightness  #
################
# Requires brightnessctl
set $brightness_notification_cmd  command -v notify-send >/dev/null && \
        VALUE=$(brightnessctl --percentage get) && \
        notify-send -e -h string:x-canonical-private-synchronous:brightness \
            -h "int:value:$VALUE" -t 800 "Brightness: ${VALUE}%"

bindsym XF86MonBrightnessDown exec \
        'STEP="$brightness_step" && brightnessctl -q set ${STEP:-5}%- && $brightness_notification_cmd'
bindsym XF86MonBrightnessUp exec \
        'STEP="$brightness_step" && brightnessctl -q set +${STEP:-5}% && $brightness_notification_cmd'

###########
#  Media  #
###########
# Requires playerctl
# Allow Play and Stop bindings even if the screen is locked
bindsym --locked {
    XF86AudioPlay       exec playerctl play-pause
    XF86AudioStop       exec playerctl stop
}

bindsym {
    XF86AudioForward    exec playerctl position +10
    XF86AudioNext       exec playerctl next
    XF86AudioPause      exec playerctl pause
    XF86AudioPrev       exec playerctl previous
    XF86AudioRewind     exec playerctl position -10
}

################
#  Screenshot  #
################
# Requires grimshot
bindsym {
    # Capture the currently active output
    Insert exec grimshot --notify save output
    # Capture the currently active window
    Alt+Insert exec grimshot --notify save active
    # Capture a window selected manually
    Shift+Insert exec grimshot --notify save window
    # Select and capture a custom rectangular area
    Ctrl+Insert exec grimshot --notify save area
}

############
#  Volume  #
############
# Allow volume controls even if the screen is locked
bindsym --locked {
    XF86AudioRaiseVolume exec \
        $volume_helper_cmd --limit "$volume_limit" --increase "$volume_step"
    XF86AudioLowerVolume exec \
        $volume_helper_cmd --limit "$volume_limit" --decrease "$volume_step"
    XF86AudioMute    exec pactl set-sink-mute @DEFAULT_SINK@ toggle && $volume_helper_cmd
    XF86AudioMicMute exec pactl set-source-mute @DEFAULT_SOURCE@ toggle
}
