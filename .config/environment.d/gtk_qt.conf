QT_AUTO_SCREEN_SCALE_FACTOR=0   # disable Qt's automatic per-screen DPI detection
QT_SCALE_FACTOR=1.25            # scale all Qt widget sizes and fonts by 1.25x
GDK_SCALE=1                     # GTK widget size multiplier (integer only: 1=100%, 2=200%)
GDK_DPI_SCALE=1                 # GTK font DPI multiplier applied on top of GDK_SCALE
